services:
  - type: web
    name: agrobot-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: GROQ_API_KEY
        sync: false
      - key: KINDWISE_API_KEY
        sync: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
